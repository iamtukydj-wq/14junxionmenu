<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Flipbook Menu</title>
    <style>
        body { 
            background-color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        /* The container for our book */
        #menu-book { 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            display: none; /* Hidden until PDF loads */
        }
        /* Each individual page */
        .my-page { 
            background-color: white; 
            border: 1px solid #ddd; 
            overflow: hidden;
        }
        /* Ensure the PDF canvas fills the page */
        .my-page canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        #loading-text { color: white; font-family: sans-serif; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>

    <h2 id="loading-text">Loading Menu...</h2>
    <div id="menu-book"></div>

    <script>
        // Tell PDF.js where to find its worker file (required for it to run fast)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // The path to your PDF file
        const pdfUrl = '2026-Menu2.pdf'; 

        async function createPdfFlipbook() {
            const bookContainer = document.getElementById('menu-book');
            
            // Step 1: Fetch the PDF document
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            
            // Step 2: Loop through every page in the PDF
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                
                // Scale determines the resolution. 1.5 or 2.0 keeps text crisp on modern screens.
                const viewport = page.getViewport({ scale: 1.5 }); 
                
                // Create an HTML div for the page
                const pageDiv = document.createElement('div');
                pageDiv.className = 'my-page';
                
                // Create a canvas to draw the PDF onto
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                // Draw the PDF page onto the canvas
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                await page.render(renderContext).promise;
                
                // Put the canvas inside the page div, and the page div inside the book
                pageDiv.appendChild(canvas);
                bookContainer.appendChild(pageDiv);
            }

            // Hide loading text, show book
            document.getElementById('loading-text').style.display = 'none';
            bookContainer.style.display = 'block';

            // Step 3: Initialize the flipbook engine
            const pageFlip = new St.PageFlip(bookContainer, {
                width: 400, // Width of one page
                height: 600, // Height of one page
                showCover: true,
                usePortrait: true // Great for mobile
            });

            // Feed the pages we just generated into the flipbook
            pageFlip.loadFromHTML(document.querySelectorAll('.my-page'));
        }

        // Run the function!
        createPdfFlipbook().catch(error => {
            console.error("Error loading PDF:", error);
            document.getElementById('loading-text').innerText = "Failed to load menu.";
        });
    </script>
</body>
</html>
