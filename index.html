<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL: This meta tag forces mobile browsers to render at the actual screen width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Responsive PDF Menu</title>
    <style>
        body { 
            background-color: #2c3e50; /* Dark background for high contrast */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* Prevents accidental scrolling past the book */
        }
        
        /* The outer wrapper that gives the book room to breathe on mobile */
        .flip-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
            box-sizing: border-box;
        }

        #menu-book { 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            display: none; 
        }
        
        .my-page { 
            background-color: white; 
            border: 1px solid #ddd; 
            overflow: hidden;
        }
        
        .my-page canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        #loading-text { 
            color: white; 
            font-family: sans-serif; 
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>

    <h2 id="loading-text">LOADING MENU...</h2>
    
    <div class="flip-container">
        <div id="menu-book"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const pdfUrl = 'your-menu.pdf'; // Remember to update this!

        async function createPdfFlipbook() {
            const bookContainer = document.getElementById('menu-book');
            
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                
                // Bumped scale to 2.0 to keep text perfectly crisp on high-res phone screens
                const viewport = page.getViewport({ scale: 2.0 }); 
                
                const pageDiv = document.createElement('div');
                pageDiv.className = 'my-page';
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
                
                pageDiv.appendChild(canvas);
                bookContainer.appendChild(pageDiv);
            }

            document.getElementById('loading-text').style.display = 'none';
            bookContainer.style.display = 'block';

            // THE RESPONSIVE CONFIGURATION
            const pageFlip = new St.PageFlip(bookContainer, {
                width: 400, // Base page width
                height: 600, // Base page height
                size: "stretch", // Allows the book to stretch/shrink within its container
                minWidth: 300, // Limits how small a page can get
                maxWidth: 600, // Limits how large a page can get
                minHeight: 400,
                maxHeight: 800,
                showCover: true,
                mobileScrollSupport: true, // Ensures dragging/swiping feels native on touch screens
                usePortrait: true // THE MAGIC BULLET: Forces 1-page mode when the screen is narrow
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.my-page'));
        }

        createPdfFlipbook().catch(error => {
            console.error("Error loading PDF:", error);
            document.getElementById('loading-text').innerText = "Failed to load menu.";
        });
    </script>
</body>
</html>
